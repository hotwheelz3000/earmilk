<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Earmilk Hourly Feed</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-faint: #888;
    --text-fainter: #bbb;
    --card-bg: #fff;
    --card-border: #e8e8e8;
    --card-border-hover: #bbb;
    --field-bg: #fff;
    --field-border: #ddd;
    --field-border-focus: #aaa;
    --placeholder-bg: #e8e8e8;
    --accent: #1DB954;
    --accent-soft: #f0faf3;
    --error: #c0392b;
  }
  [data-theme="dark"] {
    --bg: #121212;
    --text: #f0f0f0;
    --text-muted: #a8a8a8;
    --text-faint: #888;
    --text-fainter: #6a6a6a;
    --card-bg: #1c1c1e;
    --card-border: #2c2c2e;
    --card-border-hover: #4a4a4a;
    --field-bg: #1c1c1e;
    --field-border: #3a3a3a;
    --field-border-focus: #5a5a5a;
    --placeholder-bg: #2c2c2e;
    --accent: #1ed760;
    --accent-soft: #14301f;
    --error: #ff6b5e;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }
  .container { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  h1 { font-size: 24px; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .theme-toggle { margin-left: auto; width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--field-border); background: var(--field-bg); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.15s, color 0.15s; }
  .theme-toggle:hover { border-color: var(--field-border-focus); color: var(--text); }
  .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .controls { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  input[type=text], select { padding: 8px 12px; border: 1px solid var(--field-border); border-radius: 10px; font-size: 14px; background: var(--field-bg); color: var(--text); outline: none; }
  input[type=text]:focus, select:focus { border-color: var(--field-border-focus); }
  input[type=text] { flex: 1; min-width: 160px; }
  select { min-width: 130px; }
  .badge { font-size: 13px; color: var(--text-faint); margin-left: auto; white-space: nowrap; }
  .list { display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
  .card:hover { border-color: var(--card-border-hover); }
  .num { font-size: 12px; color: var(--text-fainter); min-width: 22px; text-align: right; flex-shrink: 0; }
  .artwork { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .artwork-placeholder { width: 48px; height: 48px; border-radius: 8px; background: var(--placeholder-bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .info { flex: 1; min-width: 0; }
  .song { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .artist { font-size: 13px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .meta { display: flex; align-items: center; gap: 7px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .date { font-size: 11px; color: var(--text-fainter); white-space: nowrap; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; white-space: nowrap; font-weight: 500; }

  .g-indie      { background: #e8f5e9; color: #2e7d32; }
  .g-hiphop     { background: #fff8e1; color: #f57f17; }
  .g-electronic { background: #e3f2fd; color: #1565c0; }
  .g-folk       { background: #f1f8e9; color: #558b2f; }
  .g-rock       { background: #fff3e0; color: #e65100; }
  .g-pop        { background: #fce4ec; color: #880e4f; }
  .g-rnb        { background: #f3e5f5; color: #6a1b9a; }
  .g-default    { background: #f5f5f5; color: #555; }

  [data-theme="dark"] .g-indie      { background: rgba(76,175,80,0.16);  color: #81c784; }
  [data-theme="dark"] .g-hiphop     { background: rgba(255,179,0,0.16);  color: #ffca47; }
  [data-theme="dark"] .g-electronic { background: rgba(33,150,243,0.16); color: #64b5f6; }
  [data-theme="dark"] .g-folk       { background: rgba(124,179,66,0.16); color: #aed581; }
  [data-theme="dark"] .g-rock       { background: rgba(255,112,67,0.16); color: #ffab91; }
  [data-theme="dark"] .g-pop        { background: rgba(236,64,122,0.16); color: #f48fb1; }
  [data-theme="dark"] .g-rnb        { background: rgba(171,71,188,0.16); color: #ce93d8; }
  [data-theme="dark"] .g-default    { background: rgba(255,255,255,0.07); color: #aaa; }

  a.btn { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); text-decoration: none; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; line-height: 1; }
  a.btn:hover { background: var(--accent-soft); }
  .status { font-size: 14px; color: var(--text-faint); padding: 3rem 0; text-align: center; }
  .error { color: var(--error); }
  @media (max-width: 520px) { .date, .pill { display: none; } .card { padding: 10px 12px; } .artwork, .artwork-placeholder { width: 40px; height: 40px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="dot"></span>
    <h1>Earmilk Hourly Feed</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme"></button>
  </div>
  <p class="subtitle" id="subtitle">Loading feed...</p>
  <div class="controls" id="controls" style="display:none">
    <input type="text" id="search" placeholder="Search artist or song..." oninput="filter()">
    <select id="gf" onchange="filter()"><option value="">All genres</option></select>
    <span class="badge" id="badge"></span>
  </div>
  <div class="list" id="list"><p class="status">Fetching latest posts...</p></div>
</div>

<script>
const playIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const musicIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#888"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>`;
const sunIcon = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
const moonIcon = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
let allPosts = [];

// --- Theme handling: default to system preference, persist explicit choice ---
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("themeToggle").innerHTML = theme === "dark" ? sunIcon : moonIcon;
}
function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem("theme"); } catch (e) {}
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved || (prefersDark ? "dark" : "light"));
}
function toggleTheme() {
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  applyTheme(next);
  try { localStorage.setItem("theme", next); } catch (e) {}
}
initTheme();
document.getElementById("themeToggle").addEventListener("click", toggleTheme);
// Follow system changes only when the user hasn't picked a theme manually
if (window.matchMedia) {
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
    let saved = null;
    try { saved = localStorage.getItem("theme"); } catch (err) {}
    if (!saved) applyTheme(e.matches ? "dark" : "light");
  });
}

function gc(g) {
  const l = (g || "").toLowerCase();
  if (l.includes("hip") || l.includes("rap")) return "g-hiphop";
  if (l.includes("electro") || l.includes("house") || l.includes("dance") || l.includes("ambient")) return "g-electronic";
  if (l.includes("folk") || l.includes("americana") || l.includes("country")) return "g-folk";
  if (l.includes("rock") || l.includes("alt")) return "g-rock";
  if (l.includes("r&b") || l.includes("soul") || l.includes("jazz")) return "g-rnb";
  if (l.includes("pop")) return "g-pop";
  if (l.includes("indie")) return "g-indie";
  return "g-default";
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function spotifySearch(a, s) {
  return "https://open.spotify.com/search/" + encodeURIComponent((a ? a + " " : "") + s);
}

function populateGenres(posts) {
  const sel = document.getElementById("gf");
  while (sel.options.length > 1) sel.remove(1);
  [...new Set(posts.map(p => p.genre).filter(Boolean))].sort().forEach(g => {
    const o = document.createElement("option"); o.value = g; o.textContent = g; sel.appendChild(o);
  });
}

function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  const g = document.getElementById("gf").value;
  const res = allPosts.filter(p => {
    const mq = !q || (p.artist||"").toLowerCase().includes(q) || p.song.toLowerCase().includes(q) || (p.genre||"").toLowerCase().includes(q);
    return mq && (!g || p.genre === g);
  });
  document.getElementById("badge").textContent = res.length + " posts";
  const list = document.getElementById("list");
  if (!res.length) { list.innerHTML = "<p class=\"status\">No results found.</p>"; return; }
  list.innerHTML = res.map((p, i) => {
    const art = p.artwork
      ? `<img class="artwork" src="${esc(p.artwork)}" alt="" loading="lazy">`
      : `<div class="artwork-placeholder">${musicIcon}</div>`;
    return `<div class="card">
      <span class="num">${i + 1}</span>
      ${art}
      <div class="info">
        <div class="song">${esc(p.song)}</div>
        <div class="artist">${esc(p.artist || "")}</div>
      </div>
      <div class="meta">
        <span class="date">${esc(p.date || "")}</span>
        ${p.genre ? `<span class="pill ${gc(p.genre)}">${esc(p.genre)}</span>` : ""}
        <a class="btn" href="${esc(spotifySearch(p.artist, p.song))}" target="_blank" rel="noopener">${playIcon} Play</a>
      </div>
    </div>`;
  }).join("");
}

async function init() {
  try {
    const res = await fetch("posts.json", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    allPosts = data.posts || [];
    document.getElementById("subtitle").textContent =
      "Auto-updated hourly \u00b7 Last updated " + (data.updated || "recently");
    document.getElementById("controls").style.display = "flex";
    populateGenres(allPosts);
    filter();
  } catch (e) {
    document.getElementById("subtitle").textContent = "Earmilk Hourly Feed";
    document.getElementById("list").innerHTML =
      "<p class=\"status error\">Could not load posts.json \u2014 " + e.message + "</p>";
  }
}

init();
</script>
</body>
</html>
