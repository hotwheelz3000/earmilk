name: Update Earmilk Feed

on:
  schedule:
    - cron: "0 8 * * *"   # runs every day at 8am UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub too

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Earmilk RSS
        run: python fetch.py

      - name: Commit updated posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: update feed $(date -u '+%Y-%m-%d')"
          git push
